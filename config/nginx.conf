user nginx;
worker_processes auto;
error_log /data/logs/nginx/error.log;
pid /run/nginx.pid;

worker_rlimit_nofile 65535;

events {
    use epoll;
    worker_connections 65535;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_names_hash_bucket_size 128;
    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;
    client_max_body_size 100m;
    client_body_buffer_size 128k;

    sendfile   on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 60;
    keepalive_requests 1000;

    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;
    fastcgi_buffer_size 1024k;
    fastcgi_buffers 16 1024k;
    fastcgi_busy_buffers_size 2048k;
    fastcgi_temp_file_write_size 2048k;

    proxy_connect_timeout 90s;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
    proxy_buffer_size 16k;
    proxy_buffers 8 64k;
    proxy_busy_buffers_size 128k;
    proxy_temp_file_write_size 128k;
    proxy_max_temp_file_size 0;
    proxy_next_upstream error timeout invalid_header http_502 http_504;

    gzip on;
    gzip_min_length  1k;
    gzip_buffers     4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 2;
    gzip_types     text/plain application/javascript application/x-javascript text/javascript text/css application/xml application/xml+rss application/json;
    gzip_vary on;
    gzip_proxied   expired no-cache no-store private auth;
    gzip_disable   "MSIE [1-6]\.";

    server_tokens off;

    log_format access '{"@timestamp":"$time_iso8601",'        #时间格式
                    '"server_addr":"$server_addr",'        #服务器端地址
                    '"domain":"$hostname",'        #主机名
                    '"ip":"$http_x_forwarded_for",'        #浏览当前页面的用户计算机的网关()
                    '"remote_addr":"$remote_addr",'        #浏览当前页面的用户计算机的ip地址(上一级ip)
                    '"request":"$request",'        #客户端的请求地址
                    '"request_method":"$request_method",'        #http请求方法
                    '"scheme":"$scheme",'        #请求使用的web协议
                    '"body_bytes_sent":"$body_bytes_sent",'        #传输给客户端的字节数(不算响应头)
                    '"request_time":"$request_time",'        #处理客户端请求使用的时间
                    '"upstream_response_time":"$upstream_response_time",'        #请求过程中upstream响应时间
                    '"upstream_addr":"$upstream_addr",'        #后台upstream地址，即真正提供服务的主机地址
                    '"domain":"$host",'        #
                    '"uri":"$uri",'        #请求中的当前url
                    '"request_uri":"$request_uri",'        #请求原始url
                    '"args":"$args",'        #请求中的参数值
                    '"http_referer":"$http_referer",'        #url跳转来源,用来记录从那个页面链接访问过来的
                    '"http_user_agent":"$http_user_agent",'        #用户终端浏览器等信息
                    '"status":"$status"}';        #http响应代码

#    access_log off;
    access_log  /data/logs/nginx/access.log access;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
    include /usr/local/nginx1.28/conf/conf.d/*.conf;
}